<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telehealth Video Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient-start: #6b8c8a;
            --bg-gradient-end: #94b2af;
            --text-light: #ffffff;
            --text-dark: #555555;
            --footer-bg: #e8eded;
            --red-color: #ff3b30;
            --green-color: #4cd964;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Main phone screen container */
        .phone-screen {
            width: 375px;
            height: 812px;
            /* This gradient is a placeholder for the cartoon doctor background image */
            background: linear-gradient(to bottom, var(--bg-gradient-start), var(--bg-gradient-end));
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Header section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            color: var(--text-light);
            z-index: 10;
            position: relative;
        }

        .back-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--text-light);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .call-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .timer-container {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .recording-dot {
            width: 8px;
            height: 8px;
            background-color: var(--red-color);
            border-radius: 50%;
            margin-right: 8px;
        }

        .timer-text {
            font-size: 14px;
            font-weight: 500;
        }

        .doctor-name {
            font-size: 18px;
            font-weight: 600;
        }

        /* Patient self-view PIP */
        .patient-view {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 90px;
            height: 130px;
            background-color: #8faaa7;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Placeholder for patient's face */
        .patient-face {
            width: 45px;
            height: 65px;
            background-color: #fadbd1;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .patient-text {
            font-size: 7px;
            color: var(--text-light);
            text-align: center;
            line-height: 1.3;
            font-weight: 600;
        }

        .pip-camera-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            color: var(--text-light);
            font-size: 10px;
            background-color: rgba(0,0,0,0.4);
            width: 18px;
            height: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        /* Connection status notification */
        .connection-status {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.6);
            color: var(--text-light);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            z-index: 10;
        }
        .connection-status i {
            margin-right: 12px;
            color: var(--green-color);
            font-size: 16px;
        }

        /* Bottom controls footer */
        .controls-footer {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background-color: var(--footer-bg);
            border-radius: 40px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 30;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dark);
            font-size: 10px;
            font-weight: 700;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            background-color: #ffffff;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Special styling for the END button */
        .end-call-btn {
            background-color: var(--red-color);
            color: var(--text-light);
            width: 65px;
            height: 65px;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.5);
            margin-bottom: 8px;
        }
        
        /* Positioning for the larger end button's label */
        .end-call-container {
            margin-bottom: -5px; 
        }

        /* Notification dot for chat */
        .notification-dot {
            position: absolute;
            top: 1px;
            right: 1px;
            width: 12px;
            height: 12px;
            background-color: var(--red-color);
            border-radius: 50%;
            border: 2px solid #ffffff;
        }
    </style>
</head>
<body>
    <div class="phone-screen">
        <div class="header">
            <button class="back-btn">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="call-info">
                <div class="timer-container">
                    <div class="recording-dot"></div>
                    <span class="timer-text">04:23</span>
                </div>
                <div class="doctor-name">Dr. Sarah Mitchell</div>
            </div>
        </div>

        <div class="patient-view">
            <div class="patient-face"></div>
            <div class="patient-text">
                PATIENT SELF VIEW<br>PATIENT SAFE WORK
            </div>
            <div class="pip-camera-icon">
                <i class="fas fa-video-slash"></i>
            </div>
        </div>

        <div class="connection-status">
            <i class="fas fa-wifi"></i>
            <span>Connection stable</span>
        </div>

        <div class="controls-footer">
            <div class="control-item">
                <button class="control-btn">
                    <i class="fas fa-microphone-slash"></i>
                </button>
                <span>MUTE</span>
            </div>
            <div class="control-item">
                <button class="control-btn">
                    <i class="fas fa-video"></i>
                </button>
                <span>VIDEO ON</span>
            </div>
            <div class="control-item end-call-container">
                <button class="control-btn end-call-btn">
                    <i class="fas fa-phone-slash"></i>
                </button>
                <span>END</span>
            </div>
            <div class="control-item">
                <button class="control-btn">
                    <i class="far fa-comment-dots"></i>
                    <span class="notification-dot"></span>
                </button>
                <span>CHAT</span>
            </div>
            <div class="control-item">
                <button class="control-btn">
                    <i class="fas fa-ellipsis-h"></i>
                </button>
                <span>MORE</span>
            </div>
        </div>
    </div>
</body>
</html>
