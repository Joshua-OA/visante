workflows:
  android-build:
    name: Android Build
    working_directory: visante-app
    environment:
      node: 18
      java: 17
      groups:
        - env_vars          # your env variable group from dashboard
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Run Expo prebuild
        script: npx expo prebuild --platform android --clean
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - visante-app/android/app/build/outputs/**/*.apk
