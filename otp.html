<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Number</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #bb5454;
            --active-blue: #1c4ed8;
            --timer-orange: #d97706;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --bg-color: #ffffff;
            --border-light: #e2e8f0;
            --icon-bg: #fff5f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: var(--bg-color);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        /* Top Progress Bar */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #f1f5f9;
        }
        .progress-fill {
            width: 66.6%; /* Step 2 of 3 */
            height: 100%;
            background: var(--primary-red);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            color: var(--text-gray);
        }
        
        .header-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #475569;
        }

        .step-text {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #94a3b8;
        }

        /* Content Area */
        .content {
            text-align: center;
            margin-top: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-wrapper {
            background: var(--icon-bg);
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: var(--text-dark);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-gray);
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .subtitle strong {
            display: block;
            color: var(--text-dark);
            font-weight: 600;
            margin-top: 2px;
        }

        .change-number {
            color: var(--primary-red);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 30px;
        }

        /* OTP Input Boxes */
        .otp-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .otp-box {
            width: 55px;
            height: 65px;
            border: 1.5px solid var(--border-light);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            background: #ffffff;
        }

        .otp-box.active {
            border: 2px solid var(--active-blue);
        }

        .timer {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .timer span {
            color: var(--timer-orange);
            font-weight: 600;
        }

        /* Keypad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            gap: 25px 0px;
            margin-top: auto;
            margin-bottom: 30px;
        }

        .key {
            font-size: 22px;
            font-weight: 500;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            height: 40px;
        }

        .key-icon svg {
            stroke: var(--text-dark);
        }

        /* Footer */
        .footer-action {
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-verify {
            width: 100%;
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(187, 84, 84, 0.2);
            margin-bottom: 20px;
        }

        .secure-connection {
            font-size: 10px;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="progress-bar"><div class="progress-fill"></div></div>

    <div class="header">
        <div class="header-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </div>
        <div class="step-text">Step 2 of 3</div>
        <div class="header-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
        </div>
    </div>

    <div class="content">
        <div class="icon-wrapper">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#bb5454" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                <circle cx="8" cy="10" r="1.5" fill="#bb5454" stroke="none"></circle>
                <circle cx="12" cy="10" r="1.5" fill="#bb5454" stroke="none"></circle>
                <circle cx="16" cy="10" r="1.5" fill="#bb5454" stroke="none"></circle>
            </svg>
        </div>

        <h1>Verify your number</h1>
        
        <p class="subtitle">
            We sent a 4-digit code to 
            <strong>+233 (55) 012-345-2126</strong>
        </p>
        
        <a href="#" class="change-number">Change number</a>

        <div class="otp-container">
            <div class="otp-box active">4</div>
            <div class="otp-box"></div>
            <div class="otp-box"></div>
            <div class="otp-box"></div>
        </div>

        <p class="timer">Resend code in <span>0:24</span></p>

        <div class="keypad">
            <div class="key">1</div>
            <div class="key">2</div>
            <div class="key">3</div>
            
            <div class="key">4</div>
            <div class="key">5</div>
            <div class="key">6</div>
            
            <div class="key">7</div>
            <div class="key">8</div>
            <div class="key">9</div>
            
            <div class="key"></div>
            <div class="key">0</div>
            <div class="key key-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H9l-7-8 7-8z"></path>
                    <line x1="18" y1="9" x2="12" y2="15"></line>
                    <line x1="12" y1="9" x2="18" y2="15"></line>
                </svg>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <button class="btn-verify">Verify & Continue</button>
        <div class="secure-connection">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            SECURE CONNECTION
        </div>
    </div>
</div>

</body>
</html>
